apiVersion: external-dns.appscode.com/v1alpha1
kind: ExternalDNS
metadata:
  name: aws-edns-svc
  namespace: demo
spec:
  source:
    type:
      group: ""
      version: v1
      kind: Service
    service:
      # Automatically map Service name -> DNS
      fqdnTemplate: "{{.Name}}.prod-test.link"
  registry: txt
  txtOwnerID: external-dns
  txtPrefix: abcd
  domainFilter:
    - prod-test.link
  policy: upsert-only
  provider: aws
  aws:
    zoneType: public
    secretRef:
      name: aws-credentials
      credentialKey: credentials
